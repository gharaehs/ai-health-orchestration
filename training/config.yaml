# ============================================================
# Module 2 - QLoRA Fine-Tuning Configuration
# AI Health Orchestration System
# Model: meta-llama/Meta-Llama-3.1-8B-Instruct (fp16)
# ============================================================

# --- Model ---
model:
  name: "meta-llama/Meta-Llama-3.1-8B-Instruct"
  local_path: "./models/llama"

# --- Dataset ---
dataset:
  path: "./training/dataset/processed/health_training_data.jsonl"
  train_split: 0.85
  eval_split: 0.15
  max_seq_length: 2048

# --- LoRA Adapter ---
lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  bias: "none"

# --- Quantization (QLoRA = load fp16 model in 4-bit for training) ---
quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_compute_dtype: "float16"
  bnb_4bit_use_double_quant: true

# --- Training ---
training:
  output_dir: "./models/adapters/health-v1"
  num_train_epochs: 3
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 4
  learning_rate: 0.0002
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  weight_decay: 0.001
  fp16: true
  logging_steps: 5
  eval_steps: 20
  save_steps: 20
  save_total_limit: 2
  load_best_model_at_end: true
  report_to: "none"
  seed: 42