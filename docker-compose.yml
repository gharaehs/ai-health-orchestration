version: '3.8'

services:
  llm:
    build: ./services/llm
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    volumes:
      - ./models:/models
    ports:
      - "8000:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  vector-db:
    image: chromadb/chroma:latest
    volumes:
      - ./data/chroma:/chroma/chroma
    ports:
      - "8001:8000"
    restart: unless-stopped

